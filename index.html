<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#090b14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LinaHub">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<title>LinaHub</title>
<style>
:root{
  --bg:#070912;--panel:#111420;--panel2:#171b2a;--text:#f8f7ff;--muted:#aaa7bc;
  --line:rgba(194,166,255,.14);--purple:#a76dff;--purple2:#6f49d8;
  --green:#6add7a;--pink:#ff779d;--gold:#ffc55c;--cyan:#48d8e8;--blue:#70aaff;
  --danger:#ff6d7f;--shadow:0 18px 50px rgba(0,0,0,.38)
}
html[data-theme="light"]{
  --bg:#f5f2fa;--panel:#ffffff;--panel2:#f0ebf7;--text:#1a1720;--muted:#736e7d;
  --line:rgba(83,53,125,.13);--shadow:0 15px 40px rgba(57,40,81,.12)
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
body{background-image:radial-gradient(circle at 85% 0,rgba(129,77,220,.17),transparent 32%),radial-gradient(circle at 0 32%,rgba(36,180,191,.08),transparent 28%)}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
.app{max-width:680px;margin:0 auto;min-height:100vh;padding:calc(env(safe-area-inset-top) + 18px) 16px calc(102px + env(safe-area-inset-bottom))}
.header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:20px}
.hero{background:linear-gradient(145deg,rgba(103,61,165,.42),rgba(24,25,43,.92));border:1px solid var(--line);border-radius:32px;padding:24px;box-shadow:var(--shadow);margin-bottom:24px}
.eyebrow{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;font-weight:800;color:#b9acd3}
h1,h2,h3,p{margin:0}
h1{font-size:clamp(2rem,8vw,3.2rem);line-height:1.02;letter-spacing:-.045em}
.subtitle{margin-top:12px;color:var(--muted);line-height:1.55;font-size:1.04rem}
.icon-btn,.back,.plus{width:52px;height:52px;border:1px solid var(--line);border-radius:18px;background:var(--panel);color:var(--text);display:grid;place-items:center;box-shadow:var(--shadow);font-size:1.35rem}
.module-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.module{min-height:146px;border:1px solid var(--line);border-radius:29px;background:var(--panel);color:var(--text);box-shadow:var(--shadow);display:grid;place-items:center;position:relative;overflow:hidden}
.module:active{transform:scale(.975)}
.module-icon{width:88px;height:88px;border-radius:27px;display:grid;place-items:center;font-size:3.1rem;background:var(--iconbg);box-shadow:inset 0 0 0 1px var(--iconline),0 0 32px var(--glow)}
.module.plants{--iconbg:rgba(78,185,91,.14);--iconline:rgba(106,221,122,.2);--glow:rgba(106,221,122,.16)}
.module.meds{--iconbg:rgba(255,92,130,.14);--iconline:rgba(255,119,157,.2);--glow:rgba(255,119,157,.16)}
.module.pokemon{--iconbg:rgba(255,184,54,.14);--iconline:rgba(255,197,92,.2);--glow:rgba(255,197,92,.16)}
.module.health{--iconbg:rgba(83,143,255,.14);--iconline:rgba(112,170,255,.2);--glow:rgba(112,170,255,.16)}
.module.pets{--iconbg:rgba(41,189,205,.14);--iconline:rgba(72,216,232,.2);--glow:rgba(72,216,232,.16)}
.module.house{--iconbg:rgba(255,184,54,.14);--iconline:rgba(255,197,92,.2);--glow:rgba(255,197,92,.16)}
.pokeball{width:62px;height:62px;border-radius:50%;position:relative;background:linear-gradient(#ef4453 0 43%,#111 43% 57%,#fff 57%);border:3px solid #111}
.pokeball:after{content:"";position:absolute;width:20px;height:20px;border:5px solid #111;background:#fff;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%)}
.section{margin-top:25px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-head h2{font-size:1.32rem}
.badge{font-size:.78rem;padding:6px 10px;border-radius:999px;background:rgba(167,109,255,.15);color:#cdb0ff}
.card{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:17px;box-shadow:var(--shadow)}
.list{display:grid;gap:11px}
.row{display:flex;align-items:center;gap:12px;width:100%;padding:13px;border:1px solid rgba(255,255,255,.04);border-radius:18px;background:rgba(255,255,255,.025);color:var(--text);text-align:left}
.row-icon{width:44px;height:44px;border-radius:14px;background:rgba(167,109,255,.13);display:grid;place-items:center;font-size:1.35rem;flex:0 0 auto}
.grow{flex:1;min-width:0}
.row strong{display:block}
.row small{display:block;color:var(--muted);margin-top:4px}
.due{font-size:.78rem;color:#c8a7ff;white-space:nowrap}
.page-head{display:flex;align-items:center;gap:13px;margin-bottom:18px}
.page-head h1{font-size:1.95rem}
.page-head p{color:var(--muted);margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0 18px}
.stat{padding:15px 8px;border-radius:18px;border:1px solid var(--line);background:var(--panel);text-align:center}
.stat strong{font-size:1.3rem;display:block}
.stat small{color:var(--muted)}
.cover-card{overflow:hidden;padding:0}
.cover{height:180px;display:grid;place-items:center;background:linear-gradient(145deg,#12301d,#121725);font-size:5rem;position:relative}
.cover img{width:100%;height:100%;object-fit:cover}
.photo{position:absolute;right:14px;bottom:14px;width:48px;height:48px;border:0;border-radius:16px;background:rgba(6,7,14,.75);color:#fff;font-size:1.25rem}
.card-body{padding:17px}
.status{display:inline-flex;margin-top:9px;padding:6px 10px;border-radius:999px;background:rgba(106,221,122,.12);color:#83e790;font-size:.78rem}
.tabs{display:flex;gap:7px;overflow:auto;margin:14px 0 18px}
.tab{border:0;background:transparent;color:var(--muted);padding:10px 13px;border-radius:12px;white-space:nowrap}
.tab.active{background:rgba(167,109,255,.15);color:#d4baff}
.two{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.info{border:1px solid var(--line);border-radius:17px;padding:13px;background:rgba(255,255,255,.025)}
.info small{display:block;color:var(--muted)}
.info strong{display:block;margin-top:5px}
.primary,.soft,.danger{border:0;border-radius:15px;padding:13px 15px;font-weight:800}
.primary{background:linear-gradient(135deg,var(--purple),var(--purple2));color:white}
.soft{background:rgba(167,109,255,.13);color:#d8c3ff}
.danger{background:rgba(255,109,127,.13);color:#ff9cab}
.full{width:100%}
.field{width:100%;padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:var(--panel2);color:var(--text);outline:none}
.label{display:block;color:var(--muted);font-size:.8rem;margin:0 0 5px}
.form{display:grid;gap:12px}
.check{width:22px;height:22px;border-radius:50%;border:2px solid #777183;display:grid;place-items:center;flex:0 0 auto;font-size:.75rem}
.check.done{border-color:var(--green);background:var(--green);color:white}
.strike{text-decoration:line-through;opacity:.55}
.progress{height:8px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden}
.progress span{height:100%;display:block;border-radius:inherit;background:linear-gradient(90deg,var(--purple),var(--pink))}
.nav{position:fixed;z-index:20;left:50%;bottom:calc(12px + env(safe-area-inset-bottom));transform:translateX(-50%);width:min(640px,calc(100% - 24px));height:72px;border-radius:26px;border:1px solid var(--line);background:rgba(14,16,28,.92);backdrop-filter:blur(18px);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-around}
html[data-theme="light"] .nav{background:rgba(255,255,255,.9)}
.nav button{width:52px;height:52px;border:0;border-radius:17px;background:transparent;color:#8f8a9f;font-size:1.45rem}
.nav button.active{background:rgba(167,109,255,.18);color:#caa9ff}
.empty{text-align:center;color:var(--muted);padding:30px 12px}
.modal{position:fixed;z-index:50;inset:0;background:rgba(3,4,10,.74);display:flex;align-items:flex-end;justify-content:center;padding:14px}
.sheet{width:min(680px,100%);max-height:88vh;overflow:auto;background:var(--bg);border:1px solid var(--line);border-radius:28px 28px 18px 18px;padding:20px;box-shadow:0 -25px 80px rgba(0,0,0,.5)}
.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.toast{position:fixed;z-index:80;left:50%;bottom:100px;transform:translate(-50%,18px);opacity:0;background:#25213a;border:1px solid var(--line);color:white;padding:11px 15px;border-radius:14px;transition:.2s}
.toast.show{opacity:1;transform:translate(-50%,0)}
.error{max-width:680px;margin:40px auto;padding:20px;background:#2c1320;color:#ffdbe2;border:1px solid #7a2d45;border-radius:18px}
@media(max-width:420px){.module{min-height:130px}.module-icon{width:78px;height:78px;font-size:2.7rem}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<input id="photoPicker" type="file" accept="image/*" hidden>
<script>
"use strict";
(function(){
const APP_KEY="linahub-v3-data";
const defaults={
 theme:"dark",
 plants:[
  {id:"lemon",name:"Lemon Tree",species:"Citrus limon",icon:"🍋",status:"Healthy",waterEvery:5,lastWatered:"",light:"Bright, indirect light",soil:"Well-draining potting mix",notes:"Grown from a lemon seed around two years ago.",photo:""},
  {id:"basil",name:"Basil",species:"Ocimum basilicum",icon:"🌿",status:"Healthy",waterEvery:2,lastWatered:"",light:"Bright light",soil:"Keep lightly moist",notes:"Trim flowers to encourage leafy growth.",photo:""},
  {id:"oregano",name:"Greek Oregano",species:"Origanum vulgare",icon:"🌱",status:"Healthy",waterEvery:4,lastWatered:"",light:"Sunny window",soil:"Allow the top layer to dry",notes:"",photo:""},
  {id:"orchid",name:"Orchid",species:"Phalaenopsis",icon:"🌸",status:"Photo due",waterEvery:10,lastWatered:"",light:"Bright, indirect light",soil:"Orchid bark",notes:"",photo:""},
  {id:"nemesia",name:"Nemesia 'Vanilla'",species:"Nemesia strumosa",icon:"🌼",status:"Healthy",waterEvery:3,lastWatered:"",light:"Bright light",soil:"Evenly moist",notes:"",photo:""},
  {id:"spider",name:"Spider Plant",species:"Chlorophytum comosum",icon:"🌿",status:"Healthy",waterEvery:6,lastWatered:"",light:"Bright, indirect light",soil:"Let the top layer dry",notes:"",photo:""},
  {id:"prayer",name:"Prayer Plant",species:"Maranta leuconeura",icon:"🪴",status:"Photo due",waterEvery:5,lastWatered:"",light:"Filtered light",soil:"Keep lightly moist",notes:"",photo:""},
  {id:"apple",name:"Apple Seeds",species:"Malus domestica",icon:"🌱",status:"Growing",waterEvery:3,lastWatered:"",light:"Bright light",soil:"Keep lightly moist",notes:"",photo:""}
 ],
 tanks:[
  {id:"girls",name:"Girls Tank",accent:"🩷",photo:"",temperature:"",lastWaterChange:"",waterEvery:7,animals:["Female guppies","3 Amano shrimp","2 assassin snails"],notes:""},
  {id:"boys",name:"Boys Tank",accent:"💙",photo:"",temperature:"",lastWaterChange:"",waterEvery:7,animals:["Male guppies","Baby guppies in a breeding box","2 Amano shrimp","1 assassin snail"],notes:""}
 ],
 chores:[
  {id:"laundry",name:"Do laundry and hang it out",room:"Living Room / Kitchen",icon:"🧺",frequency:2,lastDone:"",fixedDay:""},
  {id:"rubbish",name:"Check rubbish and take it out if needed",room:"Living Room / Kitchen",icon:"🗑️",frequency:2,lastDone:"",fixedDay:""},
  {id:"recycling",name:"Take recycling out",room:"Garden & Patio",icon:"♻️",frequency:7,lastDone:"",fixedDay:"Thursday"},
  {id:"sides",name:"Wipe kitchen sides",room:"Living Room / Kitchen",icon:"🧽",frequency:1,lastDone:"",fixedDay:""},
  {id:"dishes",name:"Wash dishes",room:"Living Room / Kitchen",icon:"🍽️",frequency:1,lastDone:"",fixedDay:""},
  {id:"sink",name:"Clean kitchen sink",room:"Living Room / Kitchen",icon:"✨",frequency:2,lastDone:"",fixedDay:""},
  {id:"vacuumliving",name:"Vacuum",room:"Living Room / Kitchen",icon:"🧹",frequency:4,lastDone:"",fixedDay:""},
  {id:"mopliving",name:"Mop floor",room:"Living Room / Kitchen",icon:"🪣",frequency:7,lastDone:"",fixedDay:""},
  {id:"tv",name:"Dust TV and TV stand",room:"Living Room / Kitchen",icon:"📺",frequency:7,lastDone:"",fixedDay:""},
  {id:"bookliving",name:"Dust bookcases",room:"Living Room / Kitchen",icon:"📚",frequency:14,lastDone:"",fixedDay:""},
  {id:"wc",name:"Clean toilet and sink",room:"Downstairs WC",icon:"🚽",frequency:4,lastDone:"",fixedDay:""},
  {id:"bath",name:"Clean bath, sink and toilet",room:"Main Bathroom",icon:"🛁",frequency:7,lastDone:"",fixedDay:""},
  {id:"bathfloor",name:"Mop bathroom floor",room:"Main Bathroom",icon:"🪣",frequency:7,lastDone:"",fixedDay:""},
  {id:"bedding",name:"Change bedding",room:"Main Bedroom",icon:"🛏️",frequency:7,lastDone:"",fixedDay:""},
  {id:"bedroom",name:"Vacuum and dust",room:"Main Bedroom",icon:"✨",frequency:7,lastDone:"",fixedDay:""},
  {id:"study",name:"Tidy desk and vacuum",room:"Study / Guest Room",icon:"💻",frequency:7,lastDone:"",fixedDay:""},
  {id:"bookstudy",name:"Dust bookcases",room:"Study / Guest Room",icon:"📚",frequency:14,lastDone:"",fixedDay:""},
  {id:"patio",name:"Sweep patio and pebble areas",room:"Garden & Patio",icon:"🌿",frequency:7,lastDone:"",fixedDay:""},
  {id:"weeds",name:"Check for weeds",room:"Garden & Patio",icon:"🌱",frequency:7,lastDone:"",fixedDay:""},
  {id:"oven",name:"Clean oven",room:"Living Room / Kitchen",icon:"🔥",frequency:30,lastDone:"",fixedDay:""}
 ],
 medications:[],bodyLogs:[]
};
const rooms=["Living Room / Kitchen","Downstairs WC","Main Bathroom","Main Bedroom","Study / Guest Room","Garden & Patio"];
const roomIcons={"Living Room / Kitchen":"🛋️","Downstairs WC":"🚽","Main Bathroom":"🛁","Main Bedroom":"🛏️","Study / Guest Room":"💻","Garden & Patio":"🌿"};
let data=load();
let route={page:"home",id:null};

function el(id){return document.getElementById(id)}
function load(){
 try{
  const saved=JSON.parse(localStorage.getItem(APP_KEY)||"null");
  if(!saved)return JSON.parse(JSON.stringify(defaults));
  const merged=Object.assign({},defaults,saved);
  ["plants","tanks","chores","medications","bodyLogs"].forEach(k=>{if(!Array.isArray(merged[k]))merged[k]=JSON.parse(JSON.stringify(defaults[k]))});
  return merged;
 }catch(e){return JSON.parse(JSON.stringify(defaults))}
}
function save(){try{localStorage.setItem(APP_KEY,JSON.stringify(data))}catch(e){console.warn("Local storage unavailable",e)}}
function today(){return new Date().toISOString().slice(0,10)}
function startOfToday(){const d=new Date();d.setHours(0,0,0,0);return d}
function daysSince(s){if(!s)return 9999;const d=new Date(s+"T00:00:00");return Math.floor((startOfToday()-d)/86400000)}
function dueText(last,every,fixed){
 if(fixed){
  const names=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const target=names.indexOf(fixed);const offset=(target-new Date().getDay()+7)%7;
  return offset===0?"Today":offset===1?"Tomorrow":fixed;
 }
 const left=Number(every||1)-daysSince(last);
 return left<=0?"Due today":left===1?"Tomorrow":"In "+left+" days";
}
function isDue(item){return item.fixedDay?dueText("",7,item.fixedDay)==="Today":daysSince(item.lastDone)>=Number(item.frequency||1)}
function greet(){const h=new Date().getHours();return h<12?"Good morning":h<18?"Good afternoon":"Good evening"}
function toast(msg){const t=el("toast");t.textContent=msg;t.classList.add("show");clearTimeout(window.__toast);window.__toast=setTimeout(()=>t.classList.remove("show"),1700)}
function go(page,id){route={page:page,id:id||null};render();window.scrollTo(0,0)}
function nav(active){
 return '<nav class="nav">'+
  navBtn("home","⌂",active)+navBtn("plants","🌿",active)+navBtn("pets","🐾",active)+navBtn("house","🏠",active)+navBtn("settings","⚙️",active)+
  '</nav>';
}
function navBtn(page,icon,active){return '<button data-go="'+page+'" class="'+(active===page?"active":"")+'" aria-label="'+page+'">'+icon+'</button>'}
function head(title,sub,add){
 return '<div class="page-head"><button class="back" data-back>‹</button><div class="grow"><h1>'+esc(title)+'</h1><p>'+esc(sub||"")+'</p></div>'+(add||"")+'</div>';
}
function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function moduleBtn(cls,icon,label){
 return '<button class="module '+cls+'" data-go="'+cls+'" aria-label="'+esc(label)+'"><span class="module-icon">'+icon+'</span></button>';
}
function home(){
 const plantDue=data.plants.filter(p=>daysSince(p.lastWatered)>=p.waterEvery).length;
 const choreDue=data.chores.filter(isDue).length;
 const reminders=[
  plantDue?["🌿",plantDue+" plant"+(plantDue===1?"":"s")+" need checking","Today"]:null,
  ["🐠","Feed both fish tanks","Today"],
  choreDue?["🏠",choreDue+" house task"+(choreDue===1?"":"s")+" due","Today"]:null,
  ["♻️","Take recycling out",dueText("",7,"Thursday")]
 ].filter(Boolean);
 return '<main class="app"><section class="hero"><div class="header"><div><div class="eyebrow">LinaHub</div><h1>'+greet()+', Lina ✨</h1><p class="subtitle">A gentle overview of what needs your attention today.</p></div><button class="icon-btn" id="themeButton">'+(data.theme==="dark"?"☾":"☀")+'</button></div></section>'+
 '<div class="module-grid">'+
 moduleBtn("plants","🌿","Plants")+moduleBtn("meds","💊","Medication")+moduleBtn("pokemon",'<span class="pokeball"></span>',"Pokémon GO")+moduleBtn("health","⚖️","Weight & Health")+moduleBtn("pets","🐠","Pets")+moduleBtn("house","🏠","House")+
 '</div><section class="section"><div class="section-head"><h2>Today’s reminders</h2><span class="badge">'+reminders.length+'</span></div><div class="card list">'+
 reminders.map(r=>'<div class="row"><div class="row-icon">'+r[0]+'</div><div class="grow"><strong>'+esc(r[1])+'</strong></div><span class="due">'+esc(r[2])+'</span></div>').join("")+
 '</div></section>'+nav("home")+'</main>';
}
function plants(){
 const due=data.plants.filter(p=>daysSince(p.lastWatered)>=p.waterEvery).length;
 return '<main class="app">'+head("Plants",data.plants.length+" plants • care and growth",'<button class="plus" data-action="addPlant">＋</button>')+
 '<div class="stats"><div class="stat"><strong>'+data.plants.length+'</strong><small>Plants</small></div><div class="stat"><strong>'+due+'</strong><small>Need water</small></div><div class="stat"><strong>'+data.plants.filter(p=>p.status.indexOf("Photo")>-1).length+'</strong><small>Photos due</small></div></div>'+
 '<div class="list">'+data.plants.map(p=>'<button class="row" data-plant="'+p.id+'"><div class="row-icon">'+p.icon+'</div><div class="grow"><strong>'+esc(p.name)+'</strong><small>'+esc(p.species)+'</small></div><span class="due">'+dueText(p.lastWatered,p.waterEvery,"")+'</span></button>').join("")+'</div>'+nav("plants")+'</main>';
}
function plant(){
 const p=data.plants.find(x=>x.id===route.id);if(!p)return plants();
 return '<main class="app">'+head(p.name,p.species)+
 '<section class="card cover-card"><div class="cover">'+(p.photo?'<img src="'+p.photo+'" alt="">':'<span>'+p.icon+'</span>')+'<button class="photo" data-photo="plant:'+p.id+'">📷</button></div><div class="card-body"><h2>'+esc(p.name)+'</h2><span class="status">● '+esc(p.status)+'</span></div></section>'+
 '<div class="tabs"><button class="tab active">Overview</button><button class="tab">Photos</button><button class="tab">History</button><button class="tab">Notes</button></div>'+
 '<div class="two"><div class="info"><small>Last watered</small><strong>'+(p.lastWatered||"Not logged")+'</strong></div><div class="info"><small>Next water</small><strong>'+dueText(p.lastWatered,p.waterEvery,"")+'</strong></div></div>'+
 '<section class="section card list"><div class="row"><div class="row-icon">☀️</div><div class="grow"><strong>Light</strong><small>'+esc(p.light)+'</small></div></div><div class="row"><div class="row-icon">💧</div><div class="grow"><strong>Water</strong><small>About every '+p.waterEvery+' days</small></div></div><div class="row"><div class="row-icon">🪴</div><div class="grow"><strong>Soil</strong><small>'+esc(p.soil)+'</small></div></div></section>'+
 '<section class="section card"><label class="label">Notes</label><textarea class="field" id="plantNotes" rows="4">'+esc(p.notes)+'</textarea><div class="two" style="margin-top:11px"><button class="primary" data-water="'+p.id+'">💧 Watered today</button><button class="soft" data-save-plant="'+p.id+'">Save notes</button></div></section>'+nav("plants")+'</main>';
}
function pets(){
 return '<main class="app">'+head("Pets","Your two aquariums")+'<div class="list">'+data.tanks.map(t=>
 '<button class="card cover-card" data-tank="'+t.id+'" style="padding:0;text-align:left;color:var(--text)"><div class="cover">'+(t.photo?'<img src="'+t.photo+'" alt="">':'🐠')+'</div><div class="card-body"><h2>'+t.accent+' '+esc(t.name)+'</h2><span class="status">● Healthy</span><div class="section list">'+t.animals.map(a=>'<div class="row"><div class="row-icon">•</div><div class="grow"><strong>'+esc(a)+'</strong></div></div>').join("")+'</div><div class="two"><div class="info"><small>Water change</small><strong>'+dueText(t.lastWaterChange,t.waterEvery,"")+'</strong></div><div class="info"><small>Temperature</small><strong>'+esc(t.temperature||"Add reading")+'</strong></div></div></div></button>').join("")+'</div>'+nav("pets")+'</main>';
}
function tank(){
 const t=data.tanks.find(x=>x.id===route.id);if(!t)return pets();
 return '<main class="app">'+head(t.accent+" "+t.name,"Aquarium overview")+
 '<section class="card cover-card"><div class="cover">'+(t.photo?'<img src="'+t.photo+'" alt="">':'🐠')+'<button class="photo" data-photo="tank:'+t.id+'">📷</button></div><div class="card-body"><span class="status">● Healthy</span></div></section>'+
 '<div class="tabs"><button class="tab active">Overview</button><button class="tab">Fish & inverts</button><button class="tab">Water</button><button class="tab">Tasks</button><button class="tab">History</button></div>'+
 '<div class="two"><div class="info"><small>Last water change</small><strong>'+(t.lastWaterChange||"Not logged")+'</strong></div><div class="info"><small>Next water change</small><strong>'+dueText(t.lastWaterChange,t.waterEvery,"")+'</strong></div><div class="info"><small>Temperature</small><strong>'+esc(t.temperature||"Not added")+'</strong></div><div class="info"><small>Resident groups</small><strong>'+t.animals.length+'</strong></div></div>'+
 '<section class="section"><div class="section-head"><h2>Community</h2></div><div class="card list">'+t.animals.map(a=>'<div class="row"><div class="row-icon">🐟</div><div class="grow"><strong>'+esc(a)+'</strong></div></div>').join("")+'</div></section>'+
 '<section class="section card form"><label><span class="label">Temperature</span><input id="tankTemp" class="field" value="'+esc(t.temperature)+'" placeholder="e.g. 25°C"></label><label><span class="label">Notes</span><textarea id="tankNotes" class="field" rows="3">'+esc(t.notes)+'</textarea></label><button class="primary full" data-save-tank="'+t.id+'">Save tank details</button><button class="soft full" data-water-change="'+t.id+'">💧 Water change done today</button></section>'+nav("pets")+'</main>';
}
function taskRow(c){
 const done=daysSince(c.lastDone)===0;
 return '<button class="row" data-task="'+c.id+'"><span class="check '+(done?"done":"")+'">'+(done?"✓":"")+'</span><div class="row-icon">'+c.icon+'</div><div class="grow '+(done?"strike":"")+'"><strong>'+esc(c.name)+'</strong><small>'+esc(c.room)+'</small></div><span class="due">'+(done?"Done":dueText(c.lastDone,c.frequency,c.fixedDay))+'</span></button>';
}
function house(){
 const due=data.chores.filter(isDue);
 const completed=data.chores.filter(c=>daysSince(c.lastDone)<7).length;
 const pct=Math.round((completed/data.chores.length)*100);
 return '<main class="app">'+head("House","Calm, manageable home care")+
 '<section class="card"><div class="section-head"><h2>Today’s tasks</h2><span class="badge">'+due.length+'</span></div><div class="list">'+(due.slice(0,6).map(taskRow).join("")||'<div class="empty">Nothing urgent today ✨</div>')+'</div></section>'+
 '<section class="section card"><div class="section-head"><h2>This week</h2><span>'+pct+'%</span></div><div class="progress"><span style="width:'+pct+'%"></span></div><p class="subtitle">'+completed+' recently completed</p></section>'+
 '<section class="section"><div class="section-head"><h2>Rooms</h2><button class="soft" data-go="rooms">View all</button></div><div class="two">'+rooms.map(r=>'<button class="card" data-room="'+esc(r)+'" style="color:var(--text);text-align:left"><div style="font-size:2rem">'+roomIcons[r]+'</div><strong style="display:block;margin-top:8px">'+esc(r)+'</strong><small style="color:var(--muted)">'+data.chores.filter(c=>c.room===r).length+' tasks</small></button>').join("")+'</div></section>'+nav("house")+'</main>';
}
function roomsPage(){
 return '<main class="app">'+head("Rooms","Your two-storey home")+'<div class="list">'+rooms.map(r=>'<button class="row" data-room="'+esc(r)+'"><div class="row-icon">'+roomIcons[r]+'</div><div class="grow"><strong>'+esc(r)+'</strong><small>'+data.chores.filter(c=>c.room===r).length+' recurring tasks</small></div><span>›</span></button>').join("")+'</div>'+nav("house")+'</main>';
}
function roomPage(){
 const r=route.id;const list=data.chores.filter(c=>c.room===r);
 return '<main class="app">'+head(r,list.length+" recurring tasks")+'<div class="card list">'+list.map(taskRow).join("")+'</div><section class="section"><button class="primary full" data-add-task="'+esc(r)+'">＋ Add task</button></section>'+nav("house")+'</main>';
}
function meds(){
 return '<main class="app">'+head("Medication","Tablets, doses and reminders",'<button class="plus" data-action="addMed">＋</button>')+
 (data.medications.length?'<div class="list">'+data.medications.map(m=>'<div class="row"><div class="row-icon">💊</div><div class="grow"><strong>'+esc(m.name)+'</strong><small>'+esc(m.dose)+' • '+esc(m.time)+'</small></div></div>').join("")+'</div>':'<div class="card empty">No medication added yet.<br><br><button class="primary" data-action="addMed">Add medication</button></div>')+nav("meds")+'</main>';
}
function health(){
 const latest=data.bodyLogs[0]||{};
 return '<main class="app">'+head("Weight & Health","A gentle progress journal",'<button class="plus" data-action="addHealth">＋</button>')+
 '<div class="stats"><div class="stat"><strong>'+(latest.weight||"—")+'</strong><small>Weight</small></div><div class="stat"><strong>'+(latest.energy||"—")+'</strong><small>Energy /10</small></div><div class="stat"><strong>'+(latest.pain||"—")+'</strong><small>Pain /10</small></div></div>'+
 '<div class="card list">'+(data.bodyLogs.length?data.bodyLogs.map(l=>'<div class="row"><div class="row-icon">⚖️</div><div class="grow"><strong>'+esc(l.weight||"No weight")+' kg</strong><small>'+esc(l.date)+' • Energy '+esc(l.energy)+'/10 • Pain '+esc(l.pain)+'/10</small></div></div>').join(""):'<div class="empty">No check-ins yet.</div>')+'</div>'+nav("health")+'</main>';
}
function pokemon(){
 return '<main class="app">'+head("Pokémon GO","Friend tracker coming next")+'<div class="card empty"><div class="pokeball" style="margin:0 auto 22px"></div><h2>Waiting for your updated file</h2><p class="subtitle">The full friend and Vivillon tracker will be added after your names are updated.</p></div>'+nav("pokemon")+'</main>';
}
function settings(){
 return '<main class="app">'+head("Settings","Theme, backup and app preferences")+
 '<div class="card list"><button class="row" id="themeToggle"><div class="row-icon">'+(data.theme==="dark"?"🌙":"☀️")+'</div><div class="grow"><strong>Appearance</strong><small>'+esc(data.theme)+' mode</small></div></button>'+
 '<button class="row" id="exportData"><div class="row-icon">💾</div><div class="grow"><strong>Export backup</strong><small>Download all LinaHub data</small></div></button>'+
 '<label class="row"><div class="row-icon">📥</div><div class="grow"><strong>Import backup</strong><small>Restore a LinaHub JSON backup</small></div><input id="importData" type="file" accept=".json" hidden></label></div>'+
 '<section class="section card"><strong>LinaHub v3.0</strong><p class="subtitle">Your information stays on this device unless you export a backup.</p></section>'+nav("settings")+'</main>';
}
function render(){
 document.documentElement.dataset.theme=data.theme;
 const pages={home:home,plants:plants,plant:plant,pets:pets,tank:tank,house:house,rooms:roomsPage,room:roomPage,meds:meds,health:health,pokemon:pokemon,settings:settings};
 const fn=pages[route.page]||home;
 el("app").innerHTML=fn();
 bind();
}
function modal(title,body,setup){
 const wrap=document.createElement("div");wrap.className="modal";wrap.innerHTML='<div class="sheet"><div class="sheet-head"><h2>'+esc(title)+'</h2><button class="icon-btn" data-close>×</button></div>'+body+'</div>';
 document.body.appendChild(wrap);
 wrap.querySelector("[data-close]").onclick=()=>wrap.remove();
 wrap.onclick=e=>{if(e.target===wrap)wrap.remove()};
 if(setup)setup(wrap);
}
function bind(){
 document.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>go(b.dataset.go));
 document.querySelectorAll("[data-back]").forEach(b=>b.onclick=()=>go("home"));
 document.querySelectorAll("[data-plant]").forEach(b=>b.onclick=()=>go("plant",b.dataset.plant));
 document.querySelectorAll("[data-tank]").forEach(b=>b.onclick=()=>go("tank",b.dataset.tank));
 document.querySelectorAll("[data-room]").forEach(b=>b.onclick=()=>go("room",b.dataset.room));
 document.querySelectorAll("[data-task]").forEach(b=>b.onclick=()=>{const c=data.chores.find(x=>x.id===b.dataset.task);if(c){c.lastDone=daysSince(c.lastDone)===0?"":today();save();render();toast(c.lastDone?"Task completed":"Task reopened")}});
 document.querySelectorAll("[data-water]").forEach(b=>b.onclick=()=>{const p=data.plants.find(x=>x.id===b.dataset.water);p.lastWatered=today();save();render();toast("Watering logged")});
 document.querySelectorAll("[data-save-plant]").forEach(b=>b.onclick=()=>{const p=data.plants.find(x=>x.id===b.dataset.savePlant);p.notes=el("plantNotes").value;save();toast("Plant notes saved")});
 document.querySelectorAll("[data-save-tank]").forEach(b=>b.onclick=()=>{const t=data.tanks.find(x=>x.id===b.dataset.saveTank);t.temperature=el("tankTemp").value;t.notes=el("tankNotes").value;save();toast("Tank saved")});
 document.querySelectorAll("[data-water-change]").forEach(b=>b.onclick=()=>{const t=data.tanks.find(x=>x.id===b.dataset.waterChange);t.lastWaterChange=today();save();render();toast("Water change logged")});
 document.querySelectorAll("[data-photo]").forEach(b=>b.onclick=()=>choosePhoto(b.dataset.photo));
 document.querySelectorAll("[data-action]").forEach(b=>b.onclick=()=>{if(b.dataset.action==="addPlant")addPlant();if(b.dataset.action==="addMed")addMed();if(b.dataset.action==="addHealth")addHealth()});
 document.querySelectorAll("[data-add-task]").forEach(b=>b.onclick=()=>addTask(b.dataset.addTask));
 if(el("themeButton"))el("themeButton").onclick=toggleTheme;
 if(el("themeToggle"))el("themeToggle").onclick=toggleTheme;
 if(el("exportData"))el("exportData").onclick=exportData;
 if(el("importData"))el("importData").onchange=importData;
}
function toggleTheme(){data.theme=data.theme==="dark"?"light":"dark";save();render()}
function choosePhoto(key){
 const picker=el("photoPicker");picker.onchange=function(){
  const file=picker.files&&picker.files[0];if(!file)return;
  const reader=new FileReader();reader.onload=function(){
   const parts=key.split(":");const obj=parts[0]==="plant"?data.plants.find(x=>x.id===parts[1]):data.tanks.find(x=>x.id===parts[1]);
   if(obj){obj.photo=String(reader.result);save();render();toast("Photo updated")}
  };reader.readAsDataURL(file);picker.value="";
 };picker.click();
}
function addPlant(){modal("Add plant",'<div class="form"><input id="newPlantName" class="field" placeholder="Plant name"><input id="newPlantSpecies" class="field" placeholder="Species (optional)"><input id="newPlantEvery" class="field" type="number" min="1" value="7"><button id="saveNewPlant" class="primary">Add plant</button></div>',m=>{m.querySelector("#saveNewPlant").onclick=()=>{data.plants.push({id:"p"+Date.now(),name:m.querySelector("#newPlantName").value||"New Plant",species:m.querySelector("#newPlantSpecies").value,icon:"🌿",status:"Healthy",waterEvery:Number(m.querySelector("#newPlantEvery").value)||7,lastWatered:"",light:"Add light needs",soil:"Add soil notes",notes:"",photo:""});save();m.remove();render()}})}
function addMed(){modal("Add medication",'<div class="form"><input id="medName" class="field" placeholder="Medication name"><input id="medDose" class="field" placeholder="Dose"><input id="medTime" class="field" type="time"><button id="saveMed" class="primary">Save</button></div>',m=>{m.querySelector("#saveMed").onclick=()=>{data.medications.push({name:m.querySelector("#medName").value||"Medication",dose:m.querySelector("#medDose").value,time:m.querySelector("#medTime").value});save();m.remove();render()}})}
function addHealth(){modal("Today’s check-in",'<div class="form"><input id="logWeight" class="field" type="number" step=".1" placeholder="Weight in kg"><input id="logEnergy" class="field" type="number" min="0" max="10" placeholder="Energy 0–10"><input id="logPain" class="field" type="number" min="0" max="10" placeholder="Pain 0–10"><button id="saveHealth" class="primary">Save check-in</button></div>',m=>{m.querySelector("#saveHealth").onclick=()=>{data.bodyLogs.unshift({date:today(),weight:m.querySelector("#logWeight").value,energy:m.querySelector("#logEnergy").value,pain:m.querySelector("#logPain").value});save();m.remove();render()}})}
function addTask(room){
 modal("Add house task",'<div class="form"><input id="taskName" class="field" placeholder="Task name"><select id="taskRoom" class="field">'+rooms.map(r=>'<option '+(r===room?"selected":"")+'>'+esc(r)+'</option>').join("")+'</select><input id="taskEvery" class="field" type="number" min="1" value="7"><button id="saveTask" class="primary">Add task</button></div>',m=>{m.querySelector("#saveTask").onclick=()=>{data.chores.push({id:"t"+Date.now(),name:m.querySelector("#taskName").value||"New task",room:m.querySelector("#taskRoom").value,icon:"✨",frequency:Number(m.querySelector("#taskEvery").value)||7,lastDone:"",fixedDay:""});save();m.remove();render()}})
}
function exportData(){const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="LinaHub-backup-"+today()+".json";a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
function importData(e){const file=e.target.files&&e.target.files[0];if(!file)return;const r=new FileReader();r.onload=function(){try{data=Object.assign({},defaults,JSON.parse(String(r.result)));save();render();toast("Backup restored")}catch(err){alert("That backup could not be read.")}};r.readAsText(file)}
window.addEventListener("error",function(e){console.error(e.error||e.message)});
render();
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}))}
})();
</script>
</body>
</html>
