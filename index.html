<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#ef9dca">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LinaHub">
  <title>LinaHub</title>
  <link rel="manifest" href="./manifest.webmanifest?v=1688">
  <link rel="icon" href="./favicon.png?v=1688" type="image/png">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png?v=1688">
  <link rel="stylesheet" href="./styles.css?v=1688">
  <script>
  (function(){
    const BUILD="16.88";
    const KEY="linahub-clean-build";
    if(localStorage.getItem(KEY)!==BUILD){
      localStorage.setItem(KEY,BUILD);
      const cleanup=[];
      if("serviceWorker" in navigator){cleanup.push(navigator.serviceWorker.getRegistrations().then(rs=>Promise.all(rs.map(r=>r.unregister()))).catch(()=>{}));}
      if("caches" in window){cleanup.push(caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k)))).catch(()=>{}));}
      Promise.all(cleanup).finally(()=>{
        if(!sessionStorage.getItem("linahub-reloaded-16.88")){
          sessionStorage.setItem("linahub-reloaded-16.88","1");
          const url=new URL(location.href);
          url.searchParams.set("build","1688");
          location.replace(url.toString());
        }
      });
    }
  })();
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="./app.bundle.js?v=1688"></script>
</body>
</html>
